name: Japan Post Stamp Bot

on:
  schedule:
    - cron: "0 1 * * *"  # UTC 01:00 = JST 10:00
  workflow_dispatch:

jobs:
  check-stamps:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストール
        run: pip install requests beautifulsoup4

      - name: 新着切手を確認してDiscordに送信
        run: python japan_post_stamp_bot.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: 確認済みデータをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_stamps.json
          git diff --staged --quiet || git commit -m "chore: update seen stamps cache"
          git push
