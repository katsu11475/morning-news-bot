name: Japan Post Stamp Checker

on:
  schedule:
    - cron: "0 */6 * * *"  # 6時間おきに実行 (UTC)
  workflow_dispatch:

jobs:
  check-stamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストール
        run: pip install requests beautifulsoup4

      - name: 風景印ページをチェック
        run: python stamp_checker.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: ハッシュファイルをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stamp_last_hash.txt
          if ! git diff --cached --quiet; then
            git commit -m "chore: update stamp page hash"
            git push
          fi
